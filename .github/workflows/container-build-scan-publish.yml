name: Container Build, Scan, and Publish

on:
  workflow_run:
    workflows: ["Quality Checks"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  APP_SCAN_TAG: faceverification-app:${{ github.sha }}

jobs:
  docker:
    name: Build, scan, and publish image
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Compose file
        run: docker compose config

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=fastapi-sha-
            type=raw,value=fastapi,enable={{is_default_branch}}

      - name: Build app image for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          target: app
          load: true
          tags: ${{ env.APP_SCAN_TAG }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan app image for blocking vulnerabilities
        id: trivy_app_gate
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.APP_SCAN_TAG }}
          format: table
          severity: HIGH,CRITICAL
          vuln-type: os,library
          scanners: vuln
          ignore-unfixed: true
          exit-code: "1"

      - name: Generate app Trivy SARIF report
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.APP_SCAN_TAG }}
          format: sarif
          output: trivy-app-results.sarif
          severity: HIGH,CRITICAL
          vuln-type: os,library
          scanners: vuln
          ignore-unfixed: true
          limit-severities-for-sarif: true
          exit-code: "0"

      - name: Upload app Trivy scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-app-results.sarif
          category: trivy-app

      - name: Fail on blocking vulnerabilities
        if: steps.trivy_app_gate.outcome == 'failure'
        run: exit 1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: fastapi
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          provenance: false
          sbom: false
